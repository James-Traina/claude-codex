name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Validate JSON
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('hooks/hooks.json'))"
          python3 -c "import json; json.load(open('settings.json'))"

      - name: Check script permissions
        run: |
          for f in hooks/session-start.sh hooks/user-prompt-submit.sh scripts/classify.sh scripts/codex-exec.sh scripts/token-tracker.sh; do
            if [ ! -x "$f" ]; then echo "NOT EXECUTABLE: $f"; exit 1; fi
          done

      - name: Run test suite
        run: bash .tests/run-all.sh
